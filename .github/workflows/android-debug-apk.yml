name: Android APK

"on":
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build signed debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz
      FUO_SIGNING_STORE_FILE: ${{ github.workspace }}/signing/fuo-evolve.jks
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing keystore
        run: |
          for name in FUO_SIGNING_KEYSTORE_BASE64 FUO_SIGNING_STORE_PASSWORD FUO_SIGNING_KEY_ALIAS FUO_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$FUO_SIGNING_STORE_FILE")"
          printf '%s' "$FUO_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$FUO_SIGNING_STORE_FILE"

      - name: Build signed debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Prepare signed debug APK artifact
        run: |
          mkdir -p build/artifacts
          shopt -s nullglob
          apks=(androidApp/build/outputs/apk/debug/*.apk)
          if [ "${#apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one debug APK, found ${#apks[@]}"
            printf '%s\n' "${apks[@]}"
            exit 1
          fi
          cp "${apks[0]}" "build/artifacts/fuo-evolve-debug-signed-${GITHUB_SHA}.apk"

      - name: Upload signed debug APK
        uses: actions/upload-artifact@v7
        with:
          path: build/artifacts/fuo-evolve-debug-signed-${{ github.sha }}.apk
          archive: false
          if-no-files-found: error

  build-release-apks:
    name: Build signed release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz
      FUO_SIGNING_STORE_FILE: ${{ github.workspace }}/signing/fuo-evolve.jks
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing keystore
        run: |
          for name in FUO_SIGNING_KEYSTORE_BASE64 FUO_SIGNING_STORE_PASSWORD FUO_SIGNING_KEY_ALIAS FUO_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$FUO_SIGNING_STORE_FILE")"
          printf '%s' "$FUO_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$FUO_SIGNING_STORE_FILE"

      - name: Build signed release APKs
        run: ./gradlew :androidApp:assembleRelease -Pfuo.releaseAbiSplits=true

      - name: Prepare signed release APK artifacts
        run: |
          mkdir -p build/artifacts
          shopt -s nullglob
          arm64_apks=(androidApp/build/outputs/apk/release/*-arm64-v8a-release.apk)
          x86_64_apks=(androidApp/build/outputs/apk/release/*-x86_64-release.apk)
          universal_apks=(androidApp/build/outputs/apk/release/*-universal-release.apk)

          if [ "${#arm64_apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one arm64-v8a release APK, found ${#arm64_apks[@]}"
            printf '%s\n' "${arm64_apks[@]}"
            exit 1
          fi
          if [ "${#x86_64_apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one x86_64 release APK, found ${#x86_64_apks[@]}"
            printf '%s\n' "${x86_64_apks[@]}"
            exit 1
          fi
          if [ "${#universal_apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one universal release APK, found ${#universal_apks[@]}"
            printf '%s\n' "${universal_apks[@]}"
            exit 1
          fi

          cp "${arm64_apks[0]}" "build/artifacts/fuo-evolve-release-arm64-v8a-signed-${GITHUB_SHA}.apk"
          cp "${x86_64_apks[0]}" "build/artifacts/fuo-evolve-release-x86_64-signed-${GITHUB_SHA}.apk"
          cp "${universal_apks[0]}" "build/artifacts/fuo-evolve-release-universal-signed-${GITHUB_SHA}.apk"

      - name: Upload signed release arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          path: build/artifacts/fuo-evolve-release-arm64-v8a-signed-${{ github.sha }}.apk
          archive: false
          if-no-files-found: error

      - name: Upload signed release x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          path: build/artifacts/fuo-evolve-release-x86_64-signed-${{ github.sha }}.apk
          archive: false
          if-no-files-found: error

      - name: Upload signed release universal APK
        uses: actions/upload-artifact@v7
        with:
          path: build/artifacts/fuo-evolve-release-universal-signed-${{ github.sha }}.apk
          archive: false
          if-no-files-found: error
