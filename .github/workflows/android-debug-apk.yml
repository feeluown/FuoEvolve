name: Android APK

"on":
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build signed debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz
      FUO_SIGNING_STORE_FILE: ${{ github.workspace }}/signing/fuo-evolve.jks
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Prepare signing keystore
        run: |
          for name in FUO_SIGNING_KEYSTORE_BASE64 FUO_SIGNING_STORE_PASSWORD FUO_SIGNING_KEY_ALIAS FUO_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$FUO_SIGNING_STORE_FILE")"
          printf '%s' "$FUO_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$FUO_SIGNING_STORE_FILE"

      - name: Build signed debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Prepare signed debug APK artifact
        run: |
          mkdir -p build/artifacts
          shopt -s nullglob
          apks=(androidApp/build/outputs/apk/debug/*.apk)
          if [ "${#apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one debug APK, found ${#apks[@]}"
            printf '%s\n' "${apks[@]}"
            exit 1
          fi
          cp "${apks[0]}" "build/artifacts/fuo-evolve-debug-signed-${GITHUB_SHA}.apk"

      - name: Upload signed debug APK
        uses: actions/upload-artifact@v7
        with:
          path: build/artifacts/fuo-evolve-debug-signed-${{ github.sha }}.apk
          archive: false
          if-no-files-found: error

  build-release-apks:
    name: Build signed release APK (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: arm64
            label: arm64-v8a
            gradle_task: assembleArm64Release
            apk_glob: androidApp/build/outputs/apk/arm64/release/*-arm64-release.apk
            asset_suffix: arm64-v8a
          - id: x86_64
            label: x86_64
            gradle_task: assembleX86Release
            apk_glob: androidApp/build/outputs/apk/x86/release/*-x86-release.apk
            asset_suffix: x86_64
          - id: universal
            label: universal
            gradle_task: assembleUniversalRelease
            apk_glob: androidApp/build/outputs/apk/universal/release/*-universal-release.apk
            asset_suffix: universal
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz
      FUO_SIGNING_STORE_FILE: ${{ github.workspace }}/signing/fuo-evolve.jks
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Prepare signing keystore
        run: |
          for name in FUO_SIGNING_KEYSTORE_BASE64 FUO_SIGNING_STORE_PASSWORD FUO_SIGNING_KEY_ALIAS FUO_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$FUO_SIGNING_STORE_FILE")"
          printf '%s' "$FUO_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$FUO_SIGNING_STORE_FILE"

      - name: Build signed release APK
        run: ./gradlew :androidApp:${{ matrix.gradle_task }} -Pfuo.releasePerAbi=true

      - name: Prepare signed release APK artifact
        id: artifact
        env:
          RELEASE_APK_GLOB: ${{ matrix.apk_glob }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          mkdir -p build/artifacts
          mapfile -t apks < <(compgen -G "$RELEASE_APK_GLOB" || true)
          if [ "${#apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one ${ASSET_SUFFIX} release APK, found ${#apks[@]}"
            printf '%s\n' "${apks[@]}"
            exit 1
          fi
          artifact_path="build/artifacts/fuo-evolve-release-${ASSET_SUFFIX}-signed-${GITHUB_SHA}.apk"
          cp "${apks[0]}" "$artifact_path"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: fuo-evolve-release-${{ matrix.asset_suffix }}-signed-${{ github.sha }}
          path: ${{ steps.artifact.outputs.path }}
          archive: false
          if-no-files-found: error
