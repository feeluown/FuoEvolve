name: iOS Debug App

"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-app:
    name: Build debug iOS app
    runs-on: macos-15
    timeout-minutes: 45
    env:
      PYTHON_APPLE_SUPPORT_TAG: 3.12-b8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: iosApp/python/requirements-ios.txt

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-${{ runner.arch }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache iOS Python distribution
        uses: actions/cache@v4
        with:
          path: build/ios-python
          key: ${{ runner.os }}-${{ runner.arch }}-python-apple-support-${{ env.PYTHON_APPLE_SUPPORT_TAG }}

      - name: Prepare iOS Python runtime
        run: bash scripts/prepare-ios-python.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build debug simulator app
        run: |
          xcodebuild \
            -project iosApp/FuoEvolve.xcodeproj \
            -scheme FuoEvolve \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios-ci \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package debug app bundle
        run: |
          mkdir -p build/artifacts
          tar -cf build/artifacts/FuoEvolve-debug-ios-simulator.tar \
            -C build/ios-ci/Build/Products/Debug-iphonesimulator \
            FuoEvolve.app

      - name: Upload debug app
        uses: actions/upload-artifact@v7
        with:
          path: build/artifacts/FuoEvolve-debug-ios-simulator.tar
          archive: false
          if-no-files-found: error
