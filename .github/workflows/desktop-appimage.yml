name: Desktop AppImage

"on":
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-appimage:
    name: Build Linux desktop app image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            desktopApp/build.gradle.kts
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build desktop AppImage
        run: ./gradlew :desktopApp:packageAppImageFile

      - name: Check desktop AppImage artifact
        run: |
          artifact="build/artifacts/FuoEvolve.AppImage"
          if [ ! -x "${artifact}" ]; then
            echo "::error::Desktop AppImage was not produced at ${artifact}"
            find desktopApp/build build/artifacts -maxdepth 5 -type f -o -type d || true
            exit 1
          fi

      - name: Upload desktop app image
        uses: actions/upload-artifact@v7
        with:
          name: fuo-evolve-desktop-linux-x64-appimage-${{ github.sha }}
          path: build/artifacts/FuoEvolve.AppImage
          archive: false
          if-no-files-found: error
