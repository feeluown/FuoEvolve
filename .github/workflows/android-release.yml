name: Android Release

"on":
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-release-apks:
    name: Build signed release APK (${{ matrix.label }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: arm64
            label: arm64-v8a
            gradle_task: assembleArm64Release
            apk_glob: androidApp/build/outputs/apk/arm64/release/*-arm64-release.apk
            asset_suffix: arm64-v8a
          - id: x86_64
            label: x86_64
            gradle_task: assembleX86Release
            apk_glob: androidApp/build/outputs/apk/x86/release/*-x86-release.apk
            asset_suffix: x86_64
          - id: universal
            label: universal
            gradle_task: assembleUniversalRelease
            apk_glob: androidApp/build/outputs/apk/universal/release/*-universal-release.apk
            asset_suffix: universal
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz
      FUO_SIGNING_STORE_FILE: ${{ github.workspace }}/signing/fuo-evolve.jks
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Prepare signing keystore
        run: |
          for name in FUO_SIGNING_KEYSTORE_BASE64 FUO_SIGNING_STORE_PASSWORD FUO_SIGNING_KEY_ALIAS FUO_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$FUO_SIGNING_STORE_FILE")"
          printf '%s' "$FUO_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$FUO_SIGNING_STORE_FILE"

      - name: Build signed release APK
        run: ./gradlew :androidApp:${{ matrix.gradle_task }} -Pfuo.releasePerAbi=true

      - name: Prepare release APK asset
        id: asset
        env:
          RELEASE_APK_GLOB: ${{ matrix.apk_glob }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          mkdir -p build/artifacts
          tag="${GITHUB_REF_NAME//\//-}"
          mapfile -t apks < <(compgen -G "$RELEASE_APK_GLOB" || true)
          if [ "${#apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one ${ASSET_SUFFIX} release APK, found ${#apks[@]}"
            printf '%s\n' "${apks[@]}"
            exit 1
          fi
          asset_path="build/artifacts/fuo-evolve-${tag}-${ASSET_SUFFIX}-signed.apk"
          cp "${apks[0]}" "$asset_path"
          echo "path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload release APK asset
        uses: actions/upload-artifact@v7
        with:
          name: release-apk-${{ matrix.id }}
          path: ${{ steps.asset.outputs.path }}
          archive: false
          if-no-files-found: error

  publish-release:
    name: Publish signed release APKs
    needs: build-release-apks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release APK assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-apk-*
          path: build/artifacts
          merge-multiple: true

      - name: Verify release APK assets
        run: |
          tag="${GITHUB_REF_NAME//\//-}"
          expected=(
            "build/artifacts/fuo-evolve-${tag}-arm64-v8a-signed.apk"
            "build/artifacts/fuo-evolve-${tag}-x86_64-signed.apk"
            "build/artifacts/fuo-evolve-${tag}-universal-signed.apk"
          )
          for asset in "${expected[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "::error::Missing release APK asset: $asset"
              exit 1
            fi
          done
          mapfile -t apks < <(find build/artifacts -maxdepth 1 -type f -name '*.apk' -print)
          if [ "${#apks[@]}" -ne 3 ]; then
            echo "::error::Expected exactly three release APK assets, found ${#apks[@]}"
            printf '%s\n' "${apks[@]}"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true

  publish-fdroid-pages:
    name: Publish F-Droid repository to Pages
    needs: publish-release
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.publish-release.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install F-Droid server tools
        run: >-
          python -m pip install --disable-pip-version-check
          fdroidserver==2.4.5

      - name: Build F-Droid repository and Pages site
        run: bash scripts/build-fdroid-pages.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
