name: Android Release

"on":
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release-apks:
    name: Publish signed release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FUO_BUILD_PYTHON: python
      FUO_FEELUOWN_SOURCE: https://files.pythonhosted.org/packages/b2/41/c0f205f279e7bc5e1441d65679f693133dcac976b59ff14f3a1adf9e168d/feeluown-5.1.2.tar.gz
      FUO_SIGNING_STORE_FILE: ${{ github.workspace }}/signing/fuo-evolve.jks
      FUO_SIGNING_STORE_PASSWORD: ${{ secrets.FUO_SIGNING_STORE_PASSWORD }}
      FUO_SIGNING_KEY_ALIAS: ${{ secrets.FUO_SIGNING_KEY_ALIAS }}
      FUO_SIGNING_KEY_PASSWORD: ${{ secrets.FUO_SIGNING_KEY_PASSWORD }}
      FUO_SIGNING_KEYSTORE_BASE64: ${{ secrets.FUO_SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            androidApp/build.gradle.kts
            gradle/libs.versions.toml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Prepare signing keystore
        run: |
          for name in FUO_SIGNING_KEYSTORE_BASE64 FUO_SIGNING_STORE_PASSWORD FUO_SIGNING_KEY_ALIAS FUO_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$FUO_SIGNING_STORE_FILE")"
          printf '%s' "$FUO_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$FUO_SIGNING_STORE_FILE"

      - name: Build signed release APKs
        run: ./gradlew :androidApp:assembleRelease -Pfuo.releaseAbiSplits=true

      - name: Prepare release APK assets
        run: |
          mkdir -p build/artifacts
          shopt -s nullglob
          tag="${GITHUB_REF_NAME//\//-}"
          arm64_apks=(androidApp/build/outputs/apk/release/*-arm64-v8a-release.apk)
          x86_64_apks=(androidApp/build/outputs/apk/release/*-x86_64-release.apk)
          universal_apks=(androidApp/build/outputs/apk/release/*-universal-release.apk)

          if [ "${#arm64_apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one arm64-v8a release APK, found ${#arm64_apks[@]}"
            printf '%s\n' "${arm64_apks[@]}"
            exit 1
          fi
          if [ "${#x86_64_apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one x86_64 release APK, found ${#x86_64_apks[@]}"
            printf '%s\n' "${x86_64_apks[@]}"
            exit 1
          fi
          if [ "${#universal_apks[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one universal release APK, found ${#universal_apks[@]}"
            printf '%s\n' "${universal_apks[@]}"
            exit 1
          fi

          cp "${arm64_apks[0]}" "build/artifacts/fuo-evolve-${tag}-arm64-v8a-signed.apk"
          cp "${x86_64_apks[0]}" "build/artifacts/fuo-evolve-${tag}-x86_64-signed.apk"
          cp "${universal_apks[0]}" "build/artifacts/fuo-evolve-${tag}-universal-signed.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
