Name: FuoEvolve
Summary: Open-source Android music player based on FeelUOwn
Description: |-
  FuoEvolve is an open-source Android music player built on the FeelUOwn
  ecosystem. It supports searching across enabled music providers, playback,
  lyrics, local music, downloads, playlists, and provider account login.

  Provider availability and media access depend on the selected third-party
  services, account state, region, and the corresponding FeelUOwn plugins.

AntiFeatures:
  NonFreeNet:
    en-US: >-
      Connects to proprietary third-party music services selected by the user.
    zh-CN: 连接用户选择的第三方专有音乐服务。
